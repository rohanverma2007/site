<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rohan Verma</title>
	<link rel="icon" href="/images/favicon.ico">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		:root {
			--bg: #ffffff; --fg: #111111; --fg-dim: #666666; --fg-nav: #777777;
			--border: #cccccc; --bg-code: #f4f4f4; --link: #4a6fa5;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #151515; --fg: #dddddd; --fg-dim: #999999; --fg-nav: #aaaaaa;
				--border: #333333; --bg-code: #1e1e1e; --link: #7bafd4;
			}
		}
		body {
			background-color: #ffffff; background-color: var(--bg);
			color: #111111; color: var(--fg);
			font-family: Georgia, "Times New Roman", serif;
			font-size: 18px; line-height: 1.5; margin: 0 auto; max-width: 1200px;
		}
		@media screen and (max-width: 1200px) { body { width: 84%; padding-left: 8%; padding-right: 8%; } }
		@media screen and (max-width: 760px) { .pg-article #content-wrap { display: block; } .sn-item { display: none; } }
		@media screen and (max-width: 600px)  { body { width: 100%; padding-left: 5%; padding-right: 5%; } }

		a { color: #4a6fa5; color: var(--link); text-decoration: none; }
		a:hover { text-decoration: underline; }

		 
		#topbar { padding-top: 18px; }
		#site-title { display: inline-block; text-decoration: none; }
		#site-title:hover { opacity: 0.75; }
		#logo-wrap { display: block; height: 80px; position: relative; }
		#logo-svg { display: block; height: 80px; width: auto; position: absolute; top: 0; left: 0; }
		#logo-svg path {
			fill: none !important; stroke: #7bafd4 !important;
			stroke-width: 3.5px; stroke-linecap: round; stroke-linejoin: round;
			stroke-dasharray: 6000; stroke-dashoffset: 6000;
			animation: logo-draw 3.5s ease forwards;
		}
		#logo-svg { animation: logo-fadeout 0.45s ease forwards 4.2s; }
		#logo-text {
			display: none; position: absolute; top: 50%; transform: translateY(-50%); left: 0;
			font-size: 28px; font-weight: bold; color: #7bafd4;
			letter-spacing: -0.01em; opacity: 0; white-space: nowrap;
		}
		@keyframes logo-draw    { to { stroke-dashoffset: 0; } }
		@keyframes logo-fadeout { to { opacity: 0; } }
		@keyframes logo-fadein  { from { opacity: 0; } to { opacity: 1; } }
		#topnav { margin-top: 5px; font-size: 18px; color: #777777; color: var(--fg-nav); }
		#topnav a { color: #111111; color: var(--fg); text-decoration: none; }
		#topnav a:hover, #topnav a.active { text-decoration: underline; }
		#topnav .sep { color: #666666; color: var(--fg-dim); margin: 0 7px; }
		#topbar-rule { border-top: 1px solid #cccccc; border-top-color: var(--border); margin: 10px 0 0 0; }

		 
		#outer { padding: 28px 0 24px 0; }
		#outer:after { content: ""; display: table; clear: both; }
		#main { float: right; width: 85%; }
		.pg-article #main { float: none; width: 100%; }
		#main.full-width { float: none; width: 100%; }
		#main.home-layout { float: left; width: 58%; }

		 
		#home-sidebar {
			float: right; width: 36%; font-family: monospace; font-size: 18px;
			line-height: 1.7; color: #666666; color: var(--fg-dim); padding-top: 4px;
		}
		#home-sidebar h3 {
			font-family: Georgia, "Times New Roman", serif; font-size: 1.5rem; font-weight: 400;
			color: #111111; color: var(--fg); margin: 1.55rem 0 0.9rem; line-height: 1;
			border-bottom: 1px solid #cccccc; border-bottom-color: var(--border); padding-bottom: 4px;
		}
		#home-sidebar ul    { list-style: none; padding: 0; margin: 0; }
		#home-sidebar ul ul { padding-left: 12px; border-left: 1px solid #cccccc; border-left-color: var(--border); margin-left: 4px; }
		#home-sidebar li    { padding: 1px 0; }
		#home-sidebar a     { color: #666666; color: var(--fg-dim); text-decoration: none; display: block; }
		#home-sidebar a:hover { color: #111111; color: var(--fg); text-decoration: underline; }
		#home-sidebar .folder-label { color: #111111; color: var(--fg); font-weight: bold; display: block; padding: 1px 0; cursor: pointer; }
		#home-sidebar li.collapsed > ul { display: none; }
		#home-sidebar li.collapsed .arr { transform: rotate(-90deg); }

		 
		#tree-nav { float: left; width: 180px; font-family: monospace; font-size: 12px; line-height: 1.7; color: #666666; color: var(--fg-dim); }
		.pg-articles #tree-nav { width: 100%; float: none; font-size: 18px; line-height: 1.9; }
		#tree-nav ul    { list-style: none; padding: 0; margin: 0; }
		#tree-nav ul ul { padding-left: 12px; border-left: 1px solid #cccccc; border-left-color: var(--border); margin-left: 4px; }
		#tree-nav li    { padding: 1px 0; }
		#tree-nav a     { color: #666666; color: var(--fg-dim); text-decoration: none; display: block; }
		#tree-nav a:hover { color: #111111; color: var(--fg); text-decoration: underline; }
		#tree-nav a.cur   { color: #111111; color: var(--fg); font-weight: bold; }
		.folder-label { color: #111111; color: var(--fg); font-weight: bold; display: block; padding: 1px 0; cursor: default; }
		#tree-nav li.collapsed > ul { display: none; }
		#tree-nav li.collapsed .arr { transform: rotate(-90deg); }
		.arr { font-size: 10px; color: #666666; color: var(--fg-dim); margin-right: 3px; display: inline-block; transition: transform 0.12s; }

		 
		#content-wrap { position: relative; }
		.pg-article #content { width: 65%; }
		.sn-item { position: absolute; left: 68%; width: 28%; font-size: 12px; line-height: 1.5; color: #666666; color: var(--fg-dim); margin-bottom: 14px; }
		.sn-num { font-size: 10px; vertical-align: super; margin-right: 3px; font-family: monospace; color: #4a6fa5; color: var(--link); }

		 
		#content h1 { font-size: 2.4rem; font-weight: 400; line-height: 1; margin: 1.5rem 0; }
		#content h2 { font-size: 1.5rem; font-weight: 400; line-height: 1; margin-top: 2.1rem; margin-bottom: 0.9rem; }
		#content h3 { font-size: 1.1rem; font-weight: 400; margin-top: 1.8rem; margin-bottom: 0.6rem; }
		#content p  { margin-bottom: 1.2rem; }
		#content ul, #content ol { margin: 0 0 1.2rem 1.5rem; }
		#content li { margin-bottom: 0.3rem; }
		#content pre {
			background: #f4f4f4; background: var(--bg-code);
			border: 1px solid #cccccc; border-color: var(--border);
			padding: 12px 16px; overflow-x: auto; font-family: monospace;
			font-size: 13px; line-height: 1.5; margin-bottom: 1.2rem;
		}
		#content code     { font-family: monospace; font-size: 13px; }
		#content p code, #content li code { background: #f4f4f4; background: var(--bg-code); padding: 1px 4px; border: 1px solid #cccccc; border-color: var(--border); }
		#content pre code { background: none; padding: 0; border: none; }
		#content blockquote { border-left: 3px solid #cccccc; border-left-color: var(--border); padding: 4px 16px; color: #666666; color: var(--fg-dim); margin-bottom: 1.2rem; }
		#content hr { border-top: 1px solid #cccccc; border-top-color: var(--border); margin: 2rem 0; }
		#content table    { border-collapse: collapse; margin-bottom: 1.2rem; font-size: 14px; }
		#content th, #content td { border: 1px solid #cccccc; border-color: var(--border); padding: 6px 10px; text-align: left; }
		#content th       { background: #f4f4f4; background: var(--bg-code); font-weight: bold; }
		#content table.contact    { border: none; width: auto; }
		#content table.contact td { border: none; padding: 2px 8px 2px 0; vertical-align: top; }
		#content table.contact td:first-child { text-align: right; color: #666666; color: var(--fg-dim); font-size: 13px; white-space: nowrap; padding-right: 10px; }

		 
		#content details { margin-bottom: 0.6rem; }
		#content summary { cursor: pointer; font-weight: bold; list-style: none; padding: 0.15rem 0; user-select: none; }
		#content summary::-webkit-details-marker { display: none; }
		#content summary::before { content: "▶"; font-size: 0.6rem; margin-right: 0.45rem; display: inline-block; transition: transform 0.13s; color: #666666; color: var(--fg-dim); }
		#content details[open] > summary::before { transform: rotate(90deg); }

		 
		#content sup a, #content a.footnote-ref { color: #4a6fa5; color: var(--link); text-decoration: none; font-family: monospace; font-size: 10px; }
		.footnotes { margin-top: 2rem; border-top: 1px solid #cccccc; border-top-color: var(--border); padding-top: 1rem; font-size: 13px; color: #666666; color: var(--fg-dim); clear: both; }
		.footnotes ol { margin-left: 20px; }
		.footnotes li { margin-bottom: 6px; }
		.footnotes { display: none !important; }
		#fn-popup {
			display: none; position: fixed; bottom: 14px; left: 14px; right: 14px;
			background: #ffffff; background: var(--bg); border: 1px solid #111111; border-color: var(--fg);
			padding: 12px 14px; font-size: 13px; line-height: 1.55; z-index: 200;
			box-shadow: 0 4px 16px rgba(0,0,0,0.15);
		}
		#fn-popup.on { display: block; }
		#fn-close { position: absolute; top: 5px; right: 10px; background: none; border: none; color: #666666; color: var(--fg-dim); font-size: 17px; cursor: pointer; }

		#footer { padding: 8px 0 28px 0; font-size: 13px; color: #666666; color: var(--fg-dim); }

		@media screen and (max-width: 760px) { #sidenotes { display: none; } .footnotes { display: block !important; } }
		@media screen and (max-width: 600px) {
			#outer { display: flex; flex-direction: column; }
			#outer:after { display: none; }
			#tree-nav, #main, #main.home-layout { float: none; width: auto; }
			#home-sidebar { float: none; width: auto; margin-bottom: 20px; order: 2; }
			#tree-nav     { margin-bottom: 20px; }
			#main.home-layout { order: 1; }
		}
	</style>
	<noscript><style>
		#logo-svg { display: none !important; }
		#logo-text { display: block !important; opacity: 1 !important; position: static !important; transform: none !important; }
		#tree-nav li.collapsed > ul { display: block !important; }
		#home-sidebar li.collapsed > ul { display: block !important; }
	</style></noscript>
</head>

	var aside = document.getElementById('sidenotes');
	var fnSec = document.querySelector('.footnotes');
	var fnotes = {}, n, li, cl, bk, items;
	if (fnSec) {
		items = fnSec.querySelectorAll('li[id]');
		for (n = 0; n < items.length; n++) {
			li = items[n]; cl = li.cloneNode(true); bk = cl.querySelector('.footnote-backref');
			if (bk) bk.parentNode.removeChild(bk);
			fnotes[li.id] = cl.innerHTML;
		}
	}

	var refs = document.querySelectorAll('#content sup[id] a, #content a.footnote-ref');
	var popup = document.getElementById('fn-popup');
	var popupTx = document.getElementById('fn-text');
	var popupCl = document.getElementById('fn-close');
	var injected = 0, r, d, w;

	for (r = 0; r < refs.length; r++) {
		(function(a) {
			var key = (a.getAttribute('href') || '').replace('#', '');
			var num = a.innerHTML;
			var text = fnotes[key] || '';
			if (!text) return;
			if (!document.querySelector('[data-k="' + key + '"]')) {
			    d = document.createElement('span');
			    d.className = 'sn-item'; d.setAttribute('data-k', key);
			    d.innerHTML = '<span class="sn-num" style="color:#4a6fa5;color:var(--link)">' + num + '</span> ' + text;
			    var para = a.parentNode;
			    while (para.parentNode && para.parentNode.id !== 'content') para = para.parentNode;
			    d.style.top = para.offsetTop + 'px';
			    document.getElementById('content-wrap').appendChild(d);
			    injected++;
			}
			a.addEventListener('click', function(e) {
			    w = window.innerWidth || document.documentElement.clientWidth;
			    if (w <= 760) {
				e.preventDefault();
				var sup = a.parentNode;
				var existing = document.getElementById('inline-fn-' + key);
				if (existing) { existing.parentNode.removeChild(existing); return; }
				var box = document.createElement('span');
				box.id = 'inline-fn-' + key;
				box.style.cssText = 'display:block;margin:6px 0 6px 1em;font-size:13px;color:#999;color:var(--fg-dim);border-left:2px solid #cccccc;border-left-color:var(--border);padding-left:8px;';
				box.innerHTML = text;
				sup.parentNode.insertBefore(box, sup.nextSibling);
			    }
			});
		})(refs[r]);
	}

	if (injected > 0 && fnSec) {
		w = window.innerWidth || document.documentElement.clientWidth;
		if (w > 760) fnSec.className += ' hidden';
	}

	if (popupCl) popupCl.addEventListener('click', function() { popup.className = ''; });
	document.addEventListener('keydown', function(e) { if (e.key === 'Escape' || e.keyCode === 27) popup.className = ''; });
})();
</script>

</body>
</html>
