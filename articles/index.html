

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rohan Verma</title>

	<style>
		body {
			margin: 0;
			padding: 1em;
			font-family: Georgia, "Times New Roman", serif;
			font-size: 18px;
			line-height: 1.5;
			background: #ffffff;
			color: #111111;
		}

		a {
			color: #4a6fa5;
			text-decoration: none;
		}

		a:hover {
			text-decoration: underline;
		}

		#page {
			max-width: 1200px;
			margin: 0 auto;
		}

		#header {
			margin-bottom: 1.5em;
		}

		#logo-link {
			display: inline-block;
			text-decoration: none;
		}

		#logo-wrap {
			position: relative;
			display: inline-block;
			height: 80px;
			min-width: 320px;
			max-width: 100%;
		}

		#logo-svg {
			display: inline-block;
			vertical-align: middle;
			height: 80px;
			max-width: 100%;
			animation: logo-fadeout 0.45s ease forwards 3.2s;
		}

		#logo-svg path {
			fill: none;
			stroke: #4a6fa5;
			stroke-width: 3;
			stroke-dasharray: 6000;
			stroke-dashoffset: 6000;
			animation: draw 3s ease forwards;
		}

		#logo-text {
			position: absolute;
			top: 50%;
			left: 0;
			display: block;
			transform: translateY(-50%);
			opacity: 0;
			font-size: 28px;
			font-weight: normal;
			white-space: nowrap;
			color: #4a6fa5;
			animation: logo-text-fadein 0.45s ease forwards 3.35s;
		}

		@keyframes draw {
			to {
				stroke-dashoffset: 0;
			}
		}

		@keyframes logo-fadeout {
			to {
				opacity: 0;
				visibility: hidden;
			}
		}

		@keyframes logo-text-fadein {
			from {
				opacity: 0;
			}
			to {
				opacity: 1;
			}
		}

		#navtop {
			margin-top: 0.5em;
		}

		.rule {
			border: none;
			border-top: 1px solid #ccc;
			margin: 10px 0 20px 0;
		}

		#outer {
			overflow: visible;
		}

		#main {
			width: auto;
		}

		#sidebar {
			width: auto;
			margin-top: 2em;
		}

		.pg-articles #main {
			display: none;
		}

		.pg-articles #sidebar {
			margin-top: 0;
		}

		.pg-article #sidebar {
			display: none;
		}

		#sidebar h2 {
			margin: 0 0 10px 0;
			padding-top: 1.1em;
			padding-bottom: 4px;
			font-size: 24px;
			font-weight: normal;
			line-height: 1.2;
		}

		.tree {
			font-size: 18px;
		}

		.tree ul {
			list-style: none;
			margin: 0;
			padding-left: 1em;
		}

		.tree ul ul {
			margin-left: 0.8em;
			padding-left: 0.8em;
			border-left: 1px solid #ccc;
		}

		.tree li {
			margin: 0;
			padding: 1px 0;
		}

		.tree li > a,
		.tree li > .folder-label {
			display: block;
		}

		.folder-label {
			display: block;
			cursor: pointer;
			font-weight: normal;
		}

		.folder-label .arr {
			display: inline;
			width: auto;
			margin-right: 0.2em;
			font-size: 0.75em;
			line-height: 1;
			vertical-align: baseline;
		}

		.tree li > ul {
			display: block;
		}

		html.js .folder-label {
			display: inline-flex;
			align-items: baseline;
			gap: 0.25em;
			font-weight: lighter;
		}

		html.js .folder-label .arr {
			display: inline-block;
			width: 0.9em;
			margin-right: 0;
			font-size: 0.65em;
			text-align: center;
			transform: translateY(-0.12em);
		}

		html.js .tree li > ul {
			display: none;
		}

		html.js .tree li.open > ul {
			display: block;
		}

		h1,
		h2,
		h3 {
			font-weight: normal;
		}

		pre {
			border: 1px solid #ccc;
			padding: 0.5em;
			overflow-x: auto;
		}

		code {
			font-family: monospace;
		}

		table.contact {
			width: auto;
			border-collapse: collapse;
			margin: 0;
		}

		table.contact td {
			padding: 0 0 0.1em 0;
			border: none;
			vertical-align: top;
		}

		table.contact td:first-child {
			width: 4.5em;
			padding-right: 0.9em;
			text-align: right;
			white-space: nowrap;
		}

		table.contact td:last-child {
			text-align: left;
		}

		.fn-wrap {
			position: relative;
		}

		.fn-ref {
			font-size: 0.75em;
			vertical-align: super;
		}

		.fn-btn {
			color: #4a6fa5;
			font-size: 1em;
			line-height: 1;
		}

		.sidenote {
			display: none;
			font-size: 14px;
			line-height: 1.4;
			color: #666666;
		}

		.fn-popup {
			display: none;
		}

		.fn-wrap.open .fn-popup {
			display: none;
		}

		.footnotes {
			margin-top: 2em;
			font-size: 14px;
			line-height: 1.5;
			color: #666666;
		}

		.footnotes hr {
			display: none;
		}

		.footnotes ol {
			margin: 0;
			padding-left: 1.5em;
		}

		.footnotes li {

		}

		.footnotes a[href^="#fnref"] {

		}

		#footer {
			clear: both;
			margin-top: 2em;
			padding-top: 0.4rem;
			font-size: 14px;
			color: #666666;
		}

		@media screen and (min-width: 901px) {
			.pg-home #main {
				float: left;
				width: 68%;
			}

			.pg-home #sidebar {
				float: right;
				width: 28%;
				margin-top: 0;
			}

			.pg-article #main {
				float: left;
				width: 70%;
			}

			.pg-article .sidenote {
				display: block;
				float: right;
				clear: right;
				width: 40%;
				margin-right: -42.857%;
				padding-left: 2.857%;
			}

			html.js .pg-article .footnotes {
				display: none;
			}

			.fn-btn {
				pointer-events: none;
				cursor: text;
			}
		}

		@media screen and (max-width: 900px) {
			#page {
				max-width: none;
			}

			#main,
			#sidebar {
				float: none;
				width: auto;
				margin-top: 0;
			}

			#sidebar {
				margin-top: 2em;
			}

			.pg-article #sidebar {
				display: none;
			}

			.sidenote {
				display: none;
			}

			html.js .footnotes {
				display: none;
			}

			.fn-btn {
				pointer-events: auto;
				cursor: pointer;
			}

			.fn-wrap.open .fn-popup {
				display: block;
				margin-top: 0.4em;
				margin-bottom: 0.6em;
				padding: 0.4em 0;
				font-size: 0.9em;
				line-height: 1.45;
				color: #666666;
			}

			.fn-wrap.open .fn-popup .sn-num {
				font-weight: bold;
			}
		}

		@media (prefers-color-scheme: dark) {
			body {
				background: #151515;
				color: #dddddd;
			}

			a {
				color: #7bafd4;
			}

			.rule {
				border-top: 1px solid #333;
			}

			.tree ul ul {
				border-left: 1px solid #333;
			}

			pre {
				border: 1px solid #333;
			}

			#logo-svg path {
				stroke: #7bafd4;
			}

			#logo-text {
				color: #7bafd4;
			}

			.fn-btn {
				color: #7bafd4;
			}

			.sidenote,
			.fn-popup,
			.footnotes,
			#footer {
				color: #999999;
			}
		}
	</style>

				transform: none !important;
				opacity: 1 !important;
			}
		</style>
	</noscript>
</head>

	<script>
		document.documentElement.className += " js";
	</script>

	<script>
		(function () {
			var labels = document.querySelectorAll(".folder-label");

			labels.forEach(function (label) {
				label.addEventListener("click", function () {
					var li = label.parentElement;
					var arr = label.querySelector(".arr");

					li.classList.toggle("open");

					if (arr) {
						if (li.classList.contains("open")) {
							arr.textContent = "▼";
						} else {
							arr.textContent = "▶";
						}
					}
				});
			});

			document.querySelectorAll(".js .tree li").forEach(function (li) {
				if (li.querySelector("ul")) {
					var arr = li.querySelector(".arr");
					if (arr) {
						arr.textContent = "▶";
					}
				}
			});

			function closeAllFootnotes() {
				document.querySelectorAll(".fn-wrap.open").forEach(function (item) {
					item.classList.remove("open");
				});
			}

			var buttons = document.querySelectorAll(".fn-btn");

			buttons.forEach(function (button) {
				button.addEventListener("click", function (event) {
					if (window.innerWidth > 900) {
						return;
					}

					event.preventDefault();

					var wrap = button.closest(".fn-wrap");
					if (!wrap) {
						return;
					}

					var isOpen = wrap.classList.contains("open");

					closeAllFootnotes();

					if (!isOpen) {
						wrap.classList.add("open");
					}
				});
			});

			window.addEventListener("resize", function () {
				if (window.innerWidth > 900) {
					closeAllFootnotes();
				}
			});
		})();
	</script>
